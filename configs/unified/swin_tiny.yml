MODEL:
  PRETRAIN_PATH: 'weights/swin_tiny_patch4_window7_224.pth'
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_HW_RATIO: 2
  SEMANTIC_WEIGHT: 0.2
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('0, 1, 2, 3')
  TRANSFORMER_TYPE: 'swin_tiny_patch4_window7_224'
  STRIDE_SIZE: [16, 16]
  DIST_TRAIN: True

INPUT:
  SIZE_TRAIN: [384, 128]
  SIZE_TEST: [384, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  NAMES: 'unified_reid'
  ROOT_DIR: '/home/vnptai/duytv/projects/Person-ReID/PersonViT/datasets/'
  TRAIN_SUBSETS: ''  # '' = all subsets: duke, market, iust, cuhk03, vnpt1

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.0032  # 0.0008 x 4 GPUs
  WARMUP_EPOCHS: 20
  IMS_PER_BATCH: 256  # 64 x 4 GPUs
  WARMUP_METHOD: 'cosine'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 20
  EVAL_PERIOD: 10
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: './log/unified/swin_tiny'
